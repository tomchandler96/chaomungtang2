<!DOCTYPE html>

<title>Bệnh viện Bắc Ninh Số 2</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(180deg, #cfe8ff, #eaf4ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:100%;
  max-width:420px;
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.logo {
  width:160px;
  height:160px;
  margin-bottom:20px;
}

h1 {
  font-size:22px;
  color:#1b4f9c;
  margin-bottom:10px;
}

h2 {
  font-size:26px;
  color:#0b3d91;
  font-weight:bold;
  margin-bottom:15px;
}

p {
  font-size:14px;
  color:#4a6fa5;
}

.loader {
  margin-top:30px;
  border:5px solid rgba(0,0,0,0.1);
  border-top:5px solid #4da3ff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>

<script>
setTimeout(function(){
