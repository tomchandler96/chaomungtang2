<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bệnh viện Bắc Ninh Số 2</title>

<style>
body {
  margin:0;
  background: linear-gradient(180deg, #cfe8ff, #eaf4ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}

/* KHUNG 9:16 */
.container {
  width:100%;
  max-width:420px;
  aspect-ratio: 9 / 16;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  padding:20px;
  box-sizing:border-box;

  animation:fadeIn 0.8s ease;
}

/* LOGO */
.logo {
  width:160px;
  height:160px;
  object-fit:contain;
  margin-bottom:20px;

  border-radius:50%;
  background:white;
  padding:10px;

  box-shadow: 0 8px 25px rgba(0,0,0,0.15);

  animation:zoomIn 0.8s ease;
}

/* TEXT */
h1 {
  font-size:20px;
  color:#1b4f9c;
  margin-bottom:5px;
}

h2 {
  font-size:26px;
  color:#0b3d91;
  font-weight:bold;
  margin-bottom:15px;
}

p {
  font-size:14px;
  color:#4a6fa5;
}

/* LOADING */
.loader {
  margin-top:30px;
  border:5px solid rgba(0,0,0,0.1);
  border-top:5px solid #4da3ff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

/* ANIMATION */
@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

@keyframes zoomIn {
  from { transform: scale(0.8); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

/* FOOTER */
.footer {
  position:absolute;
  bottom:15px;
  font-size:12px;
  color:#6c8fc7;
}

</style>

<script>
setTimeout(function(){
  window.location.href = "https://docs.google.com/presentation/d/e/2PACX-1vQI6VL7obZkYmQ3lTu8aLVZnk5tjYdl5P4X0D2DGp4K_fSYHXaACqCqIEGE_Yf_0IsAQS1iZWnucAU2/pub?start=true&loop=false&delayms=999999&rm=minimal";
}, 1500);
</script>

</head>

<body>

<div class="container">

  <img src="https://raw.githubusercontent.com/tomchandler96/chaomungtang2/main/logo.png" class="logo">

  <h1>Chào mừng đến</h1>
  <h2>Bệnh Viện Đa Khoa<br>Bắc Ninh Số 2</h2>

  <p>Hệ thống hướng dẫn đang được tải...</p>

  <div class="loader"></div>

</div>

<div class="footer">
  Vui lòng chờ trong giây lát
</div>

</body>
</html>
